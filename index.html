<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowAsk - Anonim Soru & Cevap Akışı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: radial-gradient(circle at center, #0d0116 0%, #05000a 100%);
            color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: rgba(13, 1, 22, 0.75); border: 2px solid #ff007f;
            box-shadow: 0 0 20px #ff007f, inset 0 0 15px rgba(255, 0, 127, 0.3), 0 0 40px #00f0ff;
            border-radius: 16px; padding: 30px; max-width: 550px; width: 100%; text-align: center; backdrop-filter: blur(10px);
        }
        h1 { font-size: 2.5rem; color: #00f0ff; text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { color: #ff007f; text-shadow: 0 0 8px #ff007f; font-size: 0.9rem; margin-bottom: 25px; font-weight: bold; }
        
        /* Üst Menü */
        .nav-menu { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; }
        .nav-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 2px solid #00f0ff; color: #00f0ff; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.95rem; text-transform: uppercase; transition: all 0.3s; text-shadow: 0 0 5px #00f0ff; }
        .nav-btn.active { background: #00f0ff; color: #05000a; box-shadow: 0 0 15px #00f0ff; text-shadow: none; }
        .nav-btn.btn-home { border-color: #ff007f; color: #ff007f; text-shadow: 0 0 5px #ff007f; }
        .nav-btn.btn-home.active { background: #ff007f; color: #05000a; box-shadow: 0 0 15px #ff007f; text-shadow: none; }

        .panel { display: none; }
        .panel.active { display: block; }
        
        label { display: block; margin-bottom: 8px; color: #00f0ff; text-align: left; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; background: #120224; border: 2px solid #00f0ff; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; margin-bottom: 15px; transition: all 0.3s; }
        textarea { resize: none; height: 80px; border-color: #ff007f; }
        input:focus, select:focus { box-shadow: 0 0 15px #00f0ff; }
        textarea:focus { box-shadow: 0 0 15px #ff007f; }
        
        .btn { width: 100%; padding: 12px; background: transparent; border: 2px solid #ff007f; color: #ff007f; border-radius: 8px; font-size: 1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; text-shadow: 0 0 5px #ff007f; }
        .btn:hover { background: #ff007f; color: #05000a; box-shadow: 0 0 20px #ff007f; text-shadow: none; }
        .btn-blue { border-color: #00f0ff; color: #00f0ff; text-shadow: 0 0 5px #00f0ff; }
        .btn-blue:hover { background: #00f0ff; color: #05000a; box-shadow: 0 0 20px #00f0ff; text-shadow: none; }
        
        .box-title { color: #ff007f; font-weight: bold; margin-top: 10px; margin-bottom: 15px; text-shadow: 0 0 5px #ff007f; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Gelen Soru Kutuları */
        .q-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 240, 255, 0.3); padding: 15px; margin-bottom: 15px; text-align: left; border-radius: 8px; }
        .q-text { color: #fff; font-size: 1.05rem; margin-bottom: 12px; font-style: italic; border-left: 3px solid #ff007f; padding-left: 8px; }
        .reply-input { height: 50px; border-color: #00f0ff; margin-bottom: 10px; font-size: 0.95rem; }
        
        /* Twitter Akışı (Tweet Tasarımı) */
        .tweet { background: rgba(18, 2, 36, 0.6); border: 1px solid rgba(255, 0, 127, 0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tweet-header { display: flex; align-items: center; margin-bottom: 8px; }
        .tweet-avatar { width: 36px; height: 36px; background: linear-gradient(45deg, #ff007f, #00f0ff); border-radius: 50%; margin-right: 10px; }
        .tweet-author { font-weight: bold; color: #00f0ff; text-shadow: 0 0 5px rgba(0,240,255,0.3); }
        .tweet-username { color: #666; font-size: 0.85rem; margin-left: 5px; }
        .tweet-body { background: rgba(0,0,0,0.3); border-left: 3px solid #ff007f; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        .tweet-q { font-size: 0.95rem; color: #ccc; font-style: italic; }
        .tweet-reply { font-size: 1.05rem; color: #fff; padding-left: 5px; line-height: 1.4; }
        
        .no-q { color: #555; font-style: italic; margin-top: 15px; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
</head>
<body>

    <div class="container">
        <h1>GlowAsk</h1>
        <p class="subtitle">Canlı Anonim Soru & Twitter Akışı</p>

        <div id="panelRegister" class="panel active">
            <label for="regName">Oyundaki Nickin Nedir?</label>
            <input type="text" id="regName" placeholder="Nickini yaz ve giriş yap...">
            <button class="btn btn-blue" id="btnJoin">Oyuna Katıl</button>
        </div>

        <div id="gameArea" style="display: none;">
            
            <div class="nav-menu">
                <button id="navBoxBtn" class="nav-btn active">Soru Kutum</button>
                <button id="navHomeBtn" class="nav-btn btn-home">🏠 Ana Sayfa (Akış)</button>
            </div>

            <div id="tabBox" style="display: block;">
                <h3 style="color: #00f0ff; margin-bottom: 15px; text-align: left;">Selam, <span id="currentMyNick" style="text-shadow: 0 0 8px #00f0ff;">-</span></h3>
                
                <div style="border-bottom: 1px dashed rgba(255,0,127,0.2); padding-bottom: 15px; margin-bottom: 20px;">
                    <label for="targetSelect">Kime Anonim Soru Soracaksın?</label>
                    <select id="targetSelect">
                        <option value="" disabled selected>Oyuncular yükleniyor...</option>
                    </select>
                    <textarea id="questionText" placeholder="Kimsenin bilmeyeceği o soruyu fırlat..."></textarea>
                    <button class="btn btn-blue" id="btnSend">Anonim Soru Gönder</button>
                </div>

                <div>
                    <div class="box-title">Sana Gelen Sorular</div>
                    <div id="myQuestionsContainer">
                        <p class="no-q">Henüz soru yok, beklemedeyiz...</p>
                    </div>
                </div>
            </div>

            <div id="tabHome" style="display: none;">
                <div class="box-title" style="color: #00f0ff; text-shadow: 0 0 5px #00f0ff; text-align: left; margin-bottom: 20px;">🔥 CANLI AKIŞ (TWITTER)</div>
                <div id="twitterFeedContainer">
                    <p class="no-q">Henüz kimse bir soruyu cevaplamadı. Akış boş!</p>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, push, onValue, update } from "firebase/database";

        // Senin projene özel Firebase Config bilgileri
        const firebaseConfig = {
            apiKey: "AIzaSyDaZ2RkRP_XEyBbWnBKvx9tUyOizIPkvUU",
            authDomain: "glowask-c5c86.firebaseapp.com",
            databaseURL: "https://glowask-c5c86-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glowask-c5c86",
            storageBucket: "glowask-c5c86.firebasestorage.app",
            messagingSenderId: "773304465477",
            appId: "1:773304465457:web:a22d1b05a38bf3976dbd10",
            measurementId: "G-11YF9FFS4Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myNick = "";

        const btnJoin = document.getElementById('btnJoin');
        const btnSend = document.getElementById('btnSend');
        const targetSelect = document.getElementById('targetSelect');
        const currentMyNick = document.getElementById('currentMyNick');
        const myQuestionsContainer = document.getElementById('myQuestionsContainer');
        const twitterFeedContainer = document.getElementById('twitterFeedContainer');

        const navBoxBtn = document.getElementById('navBoxBtn');
        const navHomeBtn = document.getElementById('navHomeBtn');
        const tabBox = document.getElementById('tabBox');
        const tabHome = document.getElementById('tabHome');

        navBoxBtn.addEventListener('click', () => {
            tabBox.style.display = 'block';
            tabHome.style.display = 'none';
            navBoxBtn.classList.add('active');
            navHomeBtn.classList.remove('active');
        });

        navHomeBtn.addEventListener('click', () => {
            tabBox.style.display = 'none';
            tabHome.style.display = 'block';
            navBoxBtn.classList.remove('active');
            navHomeBtn.classList.add('active');
        });

        // NİCK KAYIT VE GİRİŞ
        btnJoin.addEventListener('click', () => {
            const nick = document.getElementById('regName').value.trim();
            if(!nick) { alert("Geçerli bir nick gir!"); return; }

            myNick = nick;
            currentMyNick.innerText = myNick;

            set(ref(db, 'players/' + myNick), true).then(() => {
                document.getElementById('panelRegister').style.display = 'none';
                document.getElementById('gameArea').style.display = 'block';
                dinlemeyeBasla();
            }).catch(err => alert("Giriş hatası: " + err));
        });

        function dinlemeyeBasla() {
            // OYUNCU LİSTESİ DİNLEME
            onValue(ref(db, 'players'), (snapshot) => {
                const data = snapshot.val();
                targetSelect.innerHTML = '<option value="" disabled selected>Birini Seç...</option>';
                if(data) {
                    Object.keys(data).forEach(player => {
                        if(player !== myNick) {
                            targetSelect.innerHTML += `<option value="${player}">${player}</option>`;
                        }
                    });
                }
            });

            // KİŞİSEL KUTU DİNLEME (Sadece Cevaplanmamış Sorular)
            onValue(ref(db, 'questions/' + myNick), (snapshot) => {
                const data = snapshot.val();
                myQuestionsContainer.innerHTML = "";

                let unrepliedCount = 0;

                if(data) {
                    Object.keys(data).forEach(qId => {
                        const q = data[qId];
                        if(!q.reply) {
                            unrepliedCount++;
                            myQuestionsContainer.innerHTML += `
                                <div class="q-card" id="card-${qId}">
                                    <div class="q-text">"${q.question}"</div>
                                    <input type="text" class="reply-input" id="input-${qId}" placeholder="Cevabını buraya yaz...">
                                    <button class="btn" style="padding: 8px; font-size:0.85rem;" onclick="cevapla('${qId}', '${q.question.replace(/'/g, "\\'")}')">Cevapla & Paylaş</button>
                                </div>
                            `;
                        }
                    });
                }

                if(unrepliedCount === 0) {
                    myQuestionsContainer.innerHTML = '<p class="no-q">Sana gelen yeni bir soru yok...</p>';
                }
            });

            // TWITTER AKIŞI DİNLEME
            onValue(ref(db, 'feed'), (snapshot) => {
                const data = snapshot.val();
                twitterFeedContainer.innerHTML = "";

                if(!data) {
                    twitterFeedContainer.innerHTML = '<p class="no-q">Henüz kimse bir soruyu cevaplamadı. Akış boş!</p>';
                } else {
                    const tweetList = Object.values(data).reverse();
                    tweetList.forEach(t => {
                        twitterFeedContainer.innerHTML += `
                            <div class="tweet">
                                <div class="tweet-header">
                                    <div class="tweet-avatar"></div>
                                    <div>
                                        <span class="tweet-author">${t.author}</span>
                                        <span class="tweet-username">@${t.author.toLowerCase()}</span>
                                    </div>
                                </div>
                                <div class="tweet-body">
                                    <div class="tweet-q">💬 Soru: "${t.question}"</div>
                                </div>
                                <div class="tweet-reply">📝 ${t.reply}</div>
                            </div>
                        `;
                    });
                }
            });
        }

        // ANONİM SORU GÖNDERME
        btnSend.addEventListener('click', () => {
            const target = targetSelect.value;
            const text = document.getElementById('questionText').value.trim();

            if (!target) { alert("Kime soracağını seçmedin!"); return; }
            if (!text) { alert("Soruyu boş bırakamazsın!"); return; }

            const targetQuestionsRef = ref(db, 'questions/' + target);
            const newQuestionRef = push(targetQuestionsRef);
            
            set(newQuestionRef, {
                question: text,
                reply: ""
            }).then(() => {
                document.getElementById('questionText').value = "";
                targetSelect.selectedIndex = 0;
                alert("Sorun gitmesi gereken yere tamamen anonim uçtu!");
            });
        });

        // SORUYU CEVAPLAMA VE TWITTER AKIŞINA ATMA
        window.cevapla = function(qId, originalQuestion) {
            const replyText = document.getElementById(`input-${qId}`).value.trim();
            if(!replyText) { alert("Boş cevap gönderemezsin!"); return; }

            const myQRef = ref(db, `questions/${myNick}/${qId}`);
            update(myQRef, { reply: replyText }).then(() => {
                
                const feedRef = ref(db, 'feed');
                const newFeedRef = push(feedRef);
                set(newFeedRef, {
                    author: myNick,
                    question: originalQuestion,
                    reply: replyText
                }).then(() => {
                    alert("Cevaplandı ve Ana Sayfa akışına gönderildi!");
                });

            });
        }
    </script>
</body>
</html>
