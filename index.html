<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowAsk - Anonim Soru & Cevap Akışı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: radial-gradient(circle at center, #0d0116 0%, #05000a 100%);
            color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: rgba(13, 1, 22, 0.75); border: 2px solid #ff007f;
            box-shadow: 0 0 20px #ff007f, inset 0 0 15px rgba(255, 0, 127, 0.3), 0 0 40px #00f0ff;
            border-radius: 16px; padding: 30px; max-width: 550px; width: 100%; text-align: center; backdrop-filter: blur(10px);
        }
        h1 { font-size: 2.5rem; color: #00f0ff; text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { color: #ff007f; text-shadow: 0 0 8px #ff007f; font-size: 0.9rem; margin-bottom: 25px; font-weight: bold; }
        
        .nav-menu { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; }
        .nav-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 2px solid #00f0ff; color: #00f0ff; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.95rem; text-transform: uppercase; transition: all 0.3s; text-shadow: 0 0 5px #00f0ff; }
        .nav-btn.active { background: #00f0ff; color: #05000a; box-shadow: 0 0 15px #00f0ff; text-shadow: none; }
        .nav-btn.btn-home { border-color: #ff007f; color: #ff007f; text-shadow: 0 0 5px #ff007f; }
        .nav-btn.btn-home.active { background: #ff007f; color: #05000a; box-shadow: 0 0 15px #ff007f; text-shadow: none; }
        
        /* Hatalı renk tanımını düzelttiğim kısım burası kuzen */
        .nav-btn.btn-admin { border-color: #ffff00; color: #ffff00; text-shadow: 0 0 5px #ffff00; display: none; }
        .nav-btn.btn-admin.active { background: #ffff00; color: #05000a; box-shadow: 0 0 15px #ffff00; text-shadow: none; }

        .panel { display: none; }
        .panel.active { display: block; }
        
        label { display: block; margin-bottom: 8px; color: #00f0ff; text-align: left; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; background: #120224; border: 2px solid #00f0ff; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; margin-bottom: 15px; transition: all 0.3s; }
        textarea { resize: none; height: 80px; border-color: #ff007f; }
        input:focus, select:focus { box-shadow: 0 0 15px #00f0ff; }
        textarea:focus { box-shadow: 0 0 15px #ff007f; }
        
        .btn { width: 100%; padding: 12px; background: transparent; border: 2px solid #ff007f; color: #ff007f; border-radius: 8px; font-size: 1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; text-shadow: 0 0 5px #ff007f; }
        .btn:hover { background: #ff007f; color: #05000a; box-shadow: 0 0 20px #ff007f; text-shadow: none; }
        .btn-blue { border-color: #00f0ff; color: #00f0ff; text-shadow: 0 0 5px #00f0ff; }
        .btn-blue:hover { background: #00f0ff; color: #05000a; box-shadow: 0 0 20px #00f0ff; text-shadow: none; }
        
        .box-title { color: #ff007f; font-weight: bold; margin-top: 10px; margin-bottom: 15px; text-shadow: 0 0 5px #ff007f; text-transform: uppercase; letter-spacing: 1px; }
        
        .q-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 240, 255, 0.3); padding: 15px; margin-bottom: 15px; text-align: left; border-radius: 8px; }
        .q-text { color: #fff; font-size: 1.05rem; margin-bottom: 12px; font-style: italic; border-left: 3px solid #ff007f; padding-left: 8px; }
        .reply-input { height: 50px; border-color: #00f0ff; margin-bottom: 10px; font-size: 0.95rem; }
        
        .tweet { background: rgba(18, 2, 36, 0.6); border: 1px solid rgba(255, 0, 127, 0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tweet-header { display: flex; align-items: center; margin-bottom: 8px; }
        .tweet-avatar { width: 36px; height: 36px; background: linear-gradient(45deg, #ff007f, #00f0ff); border-radius: 50%; margin-right: 10px; }
        .tweet-author { font-weight: bold; color: #00f0ff; text-shadow: 0 0 5px rgba(0,240,255,0.3); }
        .tweet-username { color: #666; font-size: 0.85rem; margin-left: 5px; }
        .tweet-body { background: rgba(0,0,0,0.3); border-left: 3px solid #ff007f; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        .tweet-q { font-size: 0.95rem; color: #ccc; font-style: italic; }
        .tweet-reply { font-size: 1.05rem; color: #fff; padding-left: 5px; line-height: 1.4; }
        
        .no-q { color: #555; font-style: italic; margin-top: 15px; }
        .admin-card { background: rgba(0, 0, 0, 0.5); border: 1px solid #ffff00; padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: left; font-size: 0.95rem; box-shadow: 0 0 10px rgba(255,255,0,0.1); }
    </style>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
</head>
<body>

    <div class="container">
        <h1>GlowAsk</h1>
        <p class="subtitle">Canlı Anonim Soru & Twitter Akışı</p>

        <div id="panelRegister" class="panel active">
            <label for="regName">Oyundaki Nickin Nedir?</label>
            <input type="text" id="regName" placeholder="Nickini yaz ve giriş yap...">
            <button class="btn btn-blue" id="btnJoin">Oyuna Katıl</button>
        </div>

        <div id="gameArea" style="display: none;">
            
            <div class="nav-menu">
                <button id="navBoxBtn" class="nav-btn active">Soru Kutum</button>
                <button id="navHomeBtn" class="nav-btn btn-home">🏠 Ana Sayfa</button>
                <button id="navAdminBtn" class="nav-btn btn-admin">👁️ GİZLİ PANEL</button>
            </div>

            <div id="tabBox" style="display: block;">
                <h3 style="color: #00f0ff; margin-bottom: 15px; text-align: left;">Selam, <span id="currentMyNick" style="text-shadow: 0 0 8px #00f0ff;">-</span></h3>
                
                <div style="border-bottom: 1px dashed rgba(255,0,127,0.2); padding-bottom: 15px; margin-bottom: 20px;">
                    <label for="targetSelect">Kime Anonim Soru Soracaksın?</label>
                    <select id="targetSelect">
                        <option value="" disabled selected>Oyuncular yükleniyor...</option>
                    </select>
                    <textarea id="questionText" placeholder="Kimsenin bilmeyeceği o soruyu fırlat..."></textarea>
                    <button class="btn btn-blue
